name: Update Plugin Repository

on:
  repository_dispatch:
    types: [plugin-updated]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update plugin manifest from source
        if: github.event_name == 'repository_dispatch'
        run: |
          PLUGIN="${{ github.event.client_payload.plugin }}"
          VERSION="${{ github.event.client_payload.version }}"
          MANIFEST="plugins/${PLUGIN}/manifest.json"

          if [ ! -f "$MANIFEST" ]; then
            echo "Warning: $MANIFEST not found"
            exit 0
          fi

          python3 - <<PYEOF
          import json, re, urllib.request
          manifest_path = "$MANIFEST"
          version = "$VERSION"
          with open(manifest_path, "r", encoding="utf-8") as f:
              local = json.load(f)

          # Pull fresh fields from the source repo's manifest.json so we never
          # drift on DalamudApiLevel, Tags, Description, etc.
          repo_url = local.get("RepoUrl", "")
          m = re.search(r"github\.com/([^/]+)/([^/]+?)(?:\.git)?/?$", repo_url)
          if m:
              owner, repo = m.group(1), m.group(2)
              for branch in ("main", "master"):
                  raw = f"https://raw.githubusercontent.com/{owner}/{repo}/{branch}/manifest.json"
                  try:
                      with urllib.request.urlopen(raw, timeout=15) as resp:
                          src = json.loads(resp.read().decode("utf-8"))
                      print(f"Pulled source manifest from {branch}")
                      # Sync API level + descriptive fields, keep download links + version
                      for key in ("DalamudApiLevel", "TestingDalamudApiLevel",
                                  "Description", "Punchline", "Tags", "CategoryTags",
                                  "ApplicableVersion", "IconUrl", "ImageUrls",
                                  "AcceptsFeedback", "LoadRequiredState", "LoadSync",
                                  "CanUnloadAsync", "LoadPriority", "IsTestingExclusive"):
                          if key in src:
                              local[key] = src[key]
                          elif key in local and key in ("TestingDalamudApiLevel",):
                              # Drop optional keys that source no longer sets
                              local.pop(key, None)
                      break
                  except Exception as e:
                      print(f"  {branch}: {e}")
              else:
                  print("Could not fetch source manifest from any branch")
          else:
              print(f"Could not parse RepoUrl: {repo_url}")

          local["AssemblyVersion"] = version
          with open(manifest_path, "w", encoding="utf-8") as f:
              json.dump(local, f, indent=2, ensure_ascii=False)
          print(f"Updated {local.get('InternalName', '?')} to {version} (API {local.get('DalamudApiLevel', '?')})")
          PYEOF

      - name: Generate pluginmaster.json
        run: python3 generate-pluginmaster.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update plugin repository"
            git push
          fi
