name: Update Plugin Repository

on:
  repository_dispatch:
    types: [plugin-updated]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update plugin version
        if: github.event_name == 'repository_dispatch'
        run: |
          PLUGIN="${{ github.event.client_payload.plugin }}"
          VERSION="${{ github.event.client_payload.version }}"
          MANIFEST="plugins/${PLUGIN}/manifest.json"

          if [ -f "$MANIFEST" ]; then
            python3 -c "
          import json
          with open('$MANIFEST', 'r') as f:
              data = json.load(f)
          data['AssemblyVersion'] = '$VERSION'
          with open('$MANIFEST', 'w') as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
          print(f'Updated {data[\"InternalName\"]} to $VERSION')
          "
          else
            echo "Warning: $MANIFEST not found"
          fi

      - name: Generate pluginmaster.json
        run: python3 generate-pluginmaster.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update plugin repository"
            git push
          fi
